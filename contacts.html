<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <span class="menu-btn"
          onclick="toggleMenu()">
        ☰
    </span>

    <h1>TRILLIONS</h1>
</header>

<div class="sidebar">
    <a href="index.html">🏠 Dashboard</a>
    <a href="retailers.html">👥 Retailers</a>
    <a href="suppliers.html">🏭 Suppliers</a>
    <a href="payments.html">💳 Payments</a>
    <a href="contacts.html">📞 Contacts</a>
    <a href="stock.html">📦 Stock</a>
    <a href="orders.html">🛒 Orders</a>
    <a href="gallery.html">🖼️ Gallery</a>
</div>

<div class="content">

    <div class="slider">
        <span id="slideText">
            Fancy Ladies Slippers
        </span>
    </div>

    <div class="card">

        <h2>Contacts</h2>

        <input
            id="name"
            type="text"
            placeholder="Enter Name"
        >

        <br><br>

        <input
            id="phone"
            type="text"
            placeholder="Enter Phone Number"
        >

        <br><br>

        <textarea
            id="desc"
            placeholder="Description"
        ></textarea>

        <br><br>

        <button
            type="button"
            onclick="saveContact()"
        >
            💾 Save Contact
        </button>

        <hr>

        <input
            id="searchBox"
            type="text"
            placeholder="Search by name or number"
            onkeyup="searchContacts()"
        >

        <hr>

        <button
            type="button"
            onclick="addShortcut('con','conBox')"
        >
            ➕ Add Shortcut
        </button>

        <div id="conBox"></div>

        <hr>

        <h3>Saved Contacts</h3>

        <div id="contactList"></div>

    </div>

    <div class="card">
        <h3>Trillions Supply</h3>
        <p>📞 6391318530</p>
        <p>✉️ trillions_supply@gmail.com</p>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
